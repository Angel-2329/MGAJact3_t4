<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ciudades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Lista de Jugadores</h2>

<a href="/nuevo" class="btn btn-primary mb-3">Nueva Ciudad</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Equipo</th>
            <th>posicion</th>
            <th>numeroCamiseta</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="j : ${Jugador}">
            <td th:text="${j.id}"></td>
            <td th:text="${j.name}"></td>
            <td th:text="${j.Id_Equipo}"></td>
            <td th:text="${j.posicion}"></td>
            <td th:text="${j.NumeroCamiseta}"></td>
            <td>
                <a th:href="@{/editar/{id}(id=${j.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/eliminar/{id}(id=${j.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
